<!DOCTYPE html>
<html>
<head>
<style>
.app { display:flex; height:100vh; }
.sidebar { width:182px; background:#0D2744; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { height:52px; background:#fff; border-bottom:1px solid #E8ECF2; display:none; align-items:center; padding:0 20px; font-weight:600; }
.screen { display:none; flex:1; overflow-y:auto; padding:18px; flex-direction:column; gap:14px; background:#F7F8FC; }
.screen.active { display:flex; }
.hk-header { background:#0D2744; padding:16px 20px; border-radius:6px; color:white; font-size:14px; font-weight:700; }
.hk-plan-bar { background:#fff; border:1px solid #E8ECF2; border-radius:6px; padding:12px 16px; font-size:12px; }
.hk-tabs { display:flex; border-bottom:1px solid #E8ECF2; background:#fff; }
.hk-tab { padding:10px 16px; font-size:12px; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; }
.hk-tab.active { border-bottom-color:#1A202C; font-weight:600; }
.hk-tab-content { background:#fff; border:1px solid #E8ECF2; border-top:none; padding:20px; }
.hkm-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.hkm-card { background:#fff; border:1px solid #E8ECF2; border-radius:6px; padding:16px; }
.nav-item { padding:10px 16px; color:rgba(255,255,255,0.6); cursor:pointer; }
.nav-item:hover, .nav-item.active { color:white; background:rgba(26,109,181,0.2); }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div style="padding:20px 16px; color:white; font-weight:700; border-bottom:1px solid rgba(255,255,255,0.07);">OTManager</div>
    <div class="nav-item" onclick="goTo('dash',this)">Dashboard</div>
    <div class="nav-item" onclick="goTo('hkmarketplace',this)">HK Marketplace</div>
  </div>
  <div class="main">
    <div class="topbar" id="tb-dash" style="display:flex;">Dashboard</div>
    <div class="topbar" id="tb-hkmarketplace">HK Marketplace</div>

    <div class="screen active" id="screen-dash">
      <div style="background:white;padding:20px;border-radius:6px;border:1px solid #E8ECF2;">
        <h2>Dashboard funciona ✓</h2>
        <p>Si ves esto, la navegación básica funciona.</p>
      </div>
    </div>

    <div class="screen" id="screen-hkmarketplace">
      <div class="hk-header">HK Marketplace — este texto debe verse</div>
      <div class="hk-plan-bar">Plan bar — este texto debe verse</div>
      <div class="hk-tabs">
        <button class="hk-tab active" onclick="hkTab(this,'hkm-inc')">Incluidos</button>
        <button class="hk-tab" onclick="hkTab(this,'hkm-add')">Add-ons</button>
      </div>
      <div id="hkm-inc" class="hk-tab-content" style="display:block;">
        <div class="hkm-grid">
          <div class="hkm-card">M1 · Gestión de OT</div>
          <div class="hkm-card">M2 · CRM</div>
          <div class="hkm-card">M3 · Garantías</div>
        </div>
      </div>
      <div id="hkm-add" class="hk-tab-content" style="display:none;">
        <p>Add-ons aquí</p>
      </div>
    </div>
  </div>
</div>

<script>
function goTo(id, navEl) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.topbar').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const sc = document.getElementById('screen-' + id);
  if (sc) sc.classList.add('active');
  const tb = document.getElementById('tb-' + id);
  if (tb) tb.style.display = 'flex';
  if (navEl) navEl.classList.add('active');
  if (id === 'hkmarketplace') {
    document.querySelectorAll('.hk-tab-content').forEach(c => c.style.display = 'none');
    document.getElementById('hkm-inc').style.display = 'block';
    document.querySelectorAll('.hk-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  }
}
function hkTab(btn, id) {
  document.querySelectorAll('.hk-tab-content').forEach(c => c.style.display = 'none');
  document.querySelectorAll('.hk-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).style.display = 'block';
  btn.classList.add('active');
}
</script>
</body>
</html>
